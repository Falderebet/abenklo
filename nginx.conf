server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self';" always;

    # Cache static assets
    location ~* \.(css|js|woff2?|svg|png|jpg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback (future-proof if a router is added)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Placeholder API endpoint — returns 501 until a backend is wired
    location /api/ {
        return 501 '{"error":"Backend not yet configured"}';
        add_header Content-Type application/json;
    }
}
